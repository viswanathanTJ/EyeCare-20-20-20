changelog:
  categories:
    - title: "🚀 New Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🔧 Maintenance"
      labels:
        - chore
        - maintenance
        - dependencies
    - title: "📖 Documentation"
      labels:
        - documentation
    - title: "🔄 Other Changes"
      labels:
        - "*"

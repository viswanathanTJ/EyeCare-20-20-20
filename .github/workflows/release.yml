name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Sync version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting version to $VERSION"
          # Update tauri.conf.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak
          # Update Cargo.toml
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build Tauri app
        run: npx @tauri-apps/cli build --target ${{ matrix.target }}
        env:
          CARGO_INCREMENTAL: 0

      - name: Upload macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: Eye2020-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: Eye2020-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Eye2020-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete existing draft release for this tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases --jq ".[] | select(.tag_name==\"${TAG}\" and .draft==true) | .id" 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting existing draft release $RELEASE_ID"
            gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID
          fi

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          # Features
          FEATURES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^[Aa]dd\|^[Ff]eat\|^[Nn]ew" 2>/dev/null || true)
          if [ -n "$FEATURES" ]; then
            echo "### 🚀 New Features" >> changelog.md
            echo "$FEATURES" >> changelog.md
            echo "" >> changelog.md
          fi
          # Fixes
          FIXES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^[Ff]ix\|^[Bb]ug" 2>/dev/null || true)
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> changelog.md
            echo "$FIXES" >> changelog.md
            echo "" >> changelog.md
          fi
          # All other commits
          OTHER=$(git log "$RANGE" --pretty=format:"- %s" --grep="^[Aa]dd\|^[Ff]eat\|^[Nn]ew\|^[Ff]ix\|^[Bb]ug" --invert-grep 2>/dev/null || true)
          if [ -n "$OTHER" ]; then
            echo "### 🔄 Other Changes" >> changelog.md
            echo "$OTHER" >> changelog.md
            echo "" >> changelog.md
          fi
          VERSION="${TAG#v}"
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "### 📦 Downloads" >> changelog.md
          echo "" >> changelog.md
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          echo "- **macOS (Apple Silicon):** [Eye2020_${VERSION}_aarch64.dmg](${BASE}/Eye2020_${VERSION}_aarch64.dmg)" >> changelog.md
          echo "- **macOS (Intel):** [Eye2020_${VERSION}_x64.dmg](${BASE}/Eye2020_${VERSION}_x64.dmg)" >> changelog.md
          echo "- **Windows (Installer):** [Eye2020_${VERSION}_x64-setup.exe](${BASE}/Eye2020_${VERSION}_x64-setup.exe)" >> changelog.md
          echo "- **Windows (MSI):** [Eye2020_${VERSION}_x64_en-US.msi](${BASE}/Eye2020_${VERSION}_x64_en-US.msi)" >> changelog.md
          echo "- **Linux (AppImage):** [Eye2020_${VERSION}_amd64.AppImage](${BASE}/Eye2020_${VERSION}_amd64.AppImage)" >> changelog.md
          echo "- **Linux (deb):** [Eye2020_${VERSION}_amd64.deb](${BASE}/Eye2020_${VERSION}_amd64.deb)" >> changelog.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: changelog.md
          files: artifacts/**/*
